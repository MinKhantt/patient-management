spring.application.name=analytics-service
server.port=4002

# --- KAFKA CONNECTION ---
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=analytics-service
spring.kafka.consumer.auto-offset-reset=earliest

# --- SERIALIZATION ---
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer

# --- PROTOCOL COMPATIBILITY ---
# Force classic protocol if I haven't upgraded broker to 4.0 yet
spring.kafka.consumer.properties.group.protocol=classic

# --- LOGGING ---
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=INFO

# Disable telemetry if it's causing "UnsupportedVersion" warnings
spring.kafka.consumer.properties.enable.metrics.push=false